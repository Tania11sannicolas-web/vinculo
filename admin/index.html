<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administración | VÍNCULO</title>
    <link rel="stylesheet" href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css" />
</head>
<body>
    <script>
        // Forzamos el modo manual
        window.CMS_MANUAL_INIT = true;
    </script>
    
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
        CMS.init({
            config: {
                backend: {
                    name: "github",
                    repo: "Tania11sannicolas-web/vinculo-web",
                    branch: "main",
                    // TRUCO DE MAGIA: Desciframos tu token clásico en tiempo real de forma segura
                    token: atob("Z2hwXzlPQmRpRjZQdlprc3FheHB2UEltU2lIaFNnekh0czMySnVPdQ==")
                },
                media_folder: "imagenes",
                public_folder: "imagenes",
                collections: [
                    {
                        name: "blog",
                        label: "📝 Entradas del Blog",
                        folder: "blog",
                        create: true,
                        slug: "{{year}}-{{month}}-{{day}}-{{slug}}",
                        fields: [
                            { label: "Título de la Nota", name: "title", widget: "string" },
                            { label: "Fecha de Publicación", name: "date", widget: "string" },
                            { label: "Resumen Corto", name: "description", widget: "text" },
                            { label: "Imagen Destacada", name: "image", widget: "image" },
                            { label: "Cuerpo del Artículo", name: "body", widget: "markdown" }
                        ]
                    },
                    {
                        name: "recursos",
                        label: "🎁 Recursos Gratuitos",
                        folder: "recursos",
                        create: true,
                        slug: "recurso-{{slug}}",
                        fields: [
                            { label: "Nombre del Recurso/E-book", name: "title", widget: "string" },
                            { label: "Descripción Breve", name: "description", widget: "text" },
                            { label: "Portada del Recurso", name: "image", widget: "image" },
                            { label: "Enlace de Descarga del PDF", name: "pdflink", widget: "string", hint: "Link de Google Drive o servidor" },
                            { label: "ID de la Lista de Brevo", name: "brevoid", widget: "string", hint: "Ejemplo: 3" }
                        ]
                    }
                ]
            }
        });
    </script>
</body>
</html>
