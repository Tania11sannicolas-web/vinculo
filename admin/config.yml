backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "imagenes"
public_folder: "imagenes"

collections:
  # COLECCIÓN 1: EL BLOG DE LECTURA (Ya lo tienes y funciona joya)
  - name: "blog"
    label: "📝 Entradas del Blog"
    folder: "blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título de la Nota", name: "title", widget: "string" }
      - { label: "Fecha de Publicación", name: "date", widget: "string" }
      - { label: "Resumen Corto", name: "description", widget: "text" }
      - { label: "Imagen Destacada", name: "image", widget: "image" }
      - { label: "Cuerpo del Artículo", name: "body", widget: "markdown" }

  # COLECCIÓN 2: RECURSOS DESCARGABLES (NUEVA DESDE CERO)
  - name: "recursos"
    label: "🎁 Recursos Gratuitos"
    folder: "recursos"
    create: true
    slug: "recurso-{{slug}}"
    fields:
      - { label: "Nombre del Recurso/E-book", name: "title", widget: "string" }
      - { label: "Descripción Breve", name: "description", widget: "text" }
      - { label: "Portada del Recurso", name: "image", widget: "image" }
      - { label: "Enlace de Descarga del PDF", name: "pdflink", widget: "string", hint: "Pega aquí el link de descarga (de Google Drive o tu servidor)" }
      - { label: "ID de la Lista de Brevo", name: "brevoid", widget: "string", hint: "El número de lista que anotaste en Brevo (Ejemplo: 3)" }
